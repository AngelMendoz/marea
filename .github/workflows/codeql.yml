name: CodeQL

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Análisis semanal aunque no haya cambios (nuevas reglas de CodeQL).
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Análisis estático (CodeQL)
    # El code scanning no está disponible en repos privados del plan Free:
    # hasta que el repo sea público, este job se salta en vez de fallar.
    if: ${{ !github.event.repository.private }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - uses: github/codeql-action/analyze@v4
